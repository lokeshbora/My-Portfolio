<!DOCTYPE html>
<html>
<head>
<title>Quiz App</title>

<style>

body{
font-family:Arial;
background:#1e1e2f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.quiz-box{
background:#2c2c3e;
padding:30px;
border-radius:10px;
width:350px;
text-align:center;
}

button{
display:block;
width:100%;
margin:10px 0;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

.option{
background:#444;
color:white;
}

.option:hover{
background:#6c63ff;
}

.selected{
background:#ff9800;
color:black;
}

#next{
background:#28a745;
color:white;
margin-top:15px;
}

</style>

</head>

<body>

<div class="quiz-box">

<h2 id="question"></h2>

<div id="answers"></div>

<button id="next" onclick="nextQuestion()">Next</button>

</div>

<script>

let questions = [
{
question:"What does HTML stand for?",
answers:["Hyper Text Markup Language","High Text Machine Language","Hyper Tool Multi Language","None"],
correct:0
},
{
question:"Which language is used for styling web pages?",
answers:["HTML","CSS","Python","C++"],
correct:1
},
{
question:"Which language is used for web interactivity?",
answers:["Java","C","JavaScript","PHP"],
correct:2
}
];

let currentQuestion = 0;
let score = 0;
let selectedAnswer = null;

function loadQuestion(){

selectedAnswer = null;

let q = questions[currentQuestion];

document.getElementById("question").innerText = q.question;

let answersHTML = "";

q.answers.forEach((answer,index)=>{
answersHTML += `<button class="option" onclick="selectOption(this, ${index})">${answer}</button>`;
});

document.getElementById("answers").innerHTML = answersHTML;

}

function selectOption(button,index){

let options = document.querySelectorAll(".option");

options.forEach(opt => opt.classList.remove("selected"));

button.classList.add("selected");

selectedAnswer = index;

}

function nextQuestion(){

if(selectedAnswer === null){
alert("Please select an option");
return;
}

if(selectedAnswer === questions[currentQuestion].correct){
score++;
}

currentQuestion++;

if(currentQuestion < questions.length){
loadQuestion();
}else{

document.querySelector(".quiz-box").innerHTML =
"<h2>Quiz Finished</h2><p>Your Score: "+score+"/"+questions.length+"</p>";

}

}

loadQuestion();

</script>

</body>
</html>
