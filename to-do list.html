<!DOCTYPE html>
<html>
<head>
<title>Colorful To-Do List</title>

<style>

body{
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
color:white;
}

.container{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:12px;
width:340px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
margin-bottom:5px;
}

#clock{
font-size:22px;
margin-bottom:15px;
color:#ffd166;
}

input{
padding:10px;
width:65%;
border:none;
border-radius:6px;
outline:none;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:#06d6a0;
color:white;
cursor:pointer;
font-weight:bold;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin-top:10px;
border-radius:6px;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>My To-Do List</h2>

<div id="clock"></div>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>

function updateClock(){
let now = new Date();
let time = now.toLocaleTimeString();
document.getElementById("clock").innerText = time;
}

setInterval(updateClock,1000);
updateClock();

function randomColor(){

let colors=[
"#ff6b6b",
"#feca57",
"#48dbfb",
"#1dd1a1",
"#5f27cd",
"#ff9ff3"
];

return colors[Math.floor(Math.random()*colors.length)];

}

function addTask(){

let input=document.getElementById("taskInput");
let task=input.value;

if(task==="") return;

let li=document.createElement("li");

li.style.background=randomColor();

li.innerHTML=
"<span>"+task+"</span>"+
"<input type='checkbox' onclick='completeTask(this)'>";

document.getElementById("taskList").appendChild(li);

input.value="";

}

function completeTask(box){

let task=box.parentElement;

setTimeout(function(){
task.remove();
},300);

}

</script>

</body>
</html>
